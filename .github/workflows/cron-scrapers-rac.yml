name: Scheduled Lead Scraper - RAC

on:
  schedule:
    # Uruchamia się 2 razy w tygodniu (Środa i Niedziela) o 08:30 UTC (10:30 czasu Polskiego)
    - cron: '30 8 * * 0,3'
  workflow_dispatch: # Umożliwia również odpalenie ręczne z zakładki Actions

jobs:
  run-scrapers:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Przyspiesza działanie poprzez cache'owanie paczek

      - name: Install Dependencies
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Scrapers (RAC Profile)
        working-directory: ./backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python src/main.py --profile rac

      - name: Send Email Notifications
        working-directory: ./backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFICATION_EMAILS: "jkucab@express.pl,jkuczek@express.pl"
          CC_EMAILS: "promanczak@express.pl"
        run: |
          python scripts/send_daily_notifications.py
